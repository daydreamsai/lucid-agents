name: Version Packages

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-bot:
    name: Release Bot
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: CI Gate — Verify package policy
        run: bun run scripts/ci/verify-packages.ts

      - name: CI Gate — Typecheck
        run: bun run type-check

      - name: CI Gate — Format check
        run: bun run format:check

      - name: CI Gate — Lint
        run: bun run lint

      - name: Start PostgreSQL test database
        run: |
          docker compose -f platform/dev/docker-compose.yml up -d test-db
          echo "Waiting for PostgreSQL to be ready..."
          timeout 60 bash -c 'until docker exec lucid-agents-test-db pg_isready -U postgres -d lucid_agents_test; do sleep 2; done' || exit 1
          echo "PostgreSQL is ready!"

      - name: CI Gate — Tests
        env:
          TEST_POSTGRES_URL: postgresql://postgres:test_password@localhost:5435/lucid_agents_test
          TEST_DATABASE_URL: postgresql://postgres:test_password@localhost:5435/lucid_agents_test
        run: bun test

      - name: CI Gate — Integration tests
        run: cd packages/integration-tests && bun test

      - name: Stop PostgreSQL test database
        if: always()
        run: |
          docker compose -f platform/dev/docker-compose.yml down -v --remove-orphans || true

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify and configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is required"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          cat ~/.npmrc

      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          version: bunx changeset version
          publish: bun run release:publish
          title: 'Version Packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
