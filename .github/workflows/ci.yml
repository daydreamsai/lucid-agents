name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────
  # Phase 0+1: Verify every package satisfies CI policy
  # ──────────────────────────────────────────────────
  verify_policy:
    name: Verify Package Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        bun-version: [latest, 1.2.0]  # Phase 4: Bun version matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package scripts policy
        run: bun run scripts/ci/verify-packages.ts

  # ──────────────────────────────────────────────────
  # Main quality checks: build, typecheck, lint, format, test
  # ──────────────────────────────────────────────────
  quality_checks:
    name: Code Quality, Build & Test (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        bun-version: [latest, 1.2.0]  # Phase 4: Bun version matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start PostgreSQL test database
        run: |
          docker compose -f platform/dev/docker-compose.yml up -d test-db
          echo "Waiting for PostgreSQL to be ready..."
          timeout 60 bash -c 'until docker exec lucid-agents-test-db pg_isready -U postgres -d lucid_agents_test; do sleep 2; done' || exit 1
          echo "PostgreSQL is ready!"

      - name: Build packages
        run: bun run build:packages

      - name: Typecheck packages
        run: bun run type-check

      - name: Lint packages
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test packages
        env:
          TEST_POSTGRES_URL: postgresql://postgres:test_password@localhost:5435/lucid_agents_test
          TEST_DATABASE_URL: postgresql://postgres:test_password@localhost:5435/lucid_agents_test
        run: bun test

      - name: Stop PostgreSQL test database
        if: always()
        run: |
          docker compose -f platform/dev/docker-compose.yml stop test-db || true

  # ──────────────────────────────────────────────────
  # Phase 2: Cross-package integration tests
  # ──────────────────────────────────────────────────
  integration_tests:
    name: Integration Tests (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality_checks]
    strategy:
      matrix:
        bun-version: [latest, 1.2.0]  # Phase 4: Bun version matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Run integration tests
        run: cd packages/integration-tests && bun test

  # ──────────────────────────────────────────────────
  # Phase 3: CLI scaffold smoke tests
  # ──────────────────────────────────────────────────
  cli_smoke_tests:
    name: CLI Scaffold Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality_checks]
    strategy:
      matrix:
        template: [blank, axllm, axllm-flow, identity, trading-data-agent]
        adapter: [hono]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build:packages

      - name: Scaffold ${{ matrix.template }} with ${{ matrix.adapter }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/scaffold-test
          cd /tmp/scaffold-test
          node ${{ github.workspace }}/packages/cli/dist/index.js create test-agent \
            --template ${{ matrix.template }} \
            --adapter ${{ matrix.adapter }} \
            --non-interactive

      - name: Install scaffolded project dependencies
        run: |
          set -euo pipefail
          cd /tmp/scaffold-test/test-agent
          bun install

      - name: Type-check scaffolded project
        run: |
          set -euo pipefail
          cd /tmp/scaffold-test/test-agent
          bunx tsc --noEmit
