name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-packages:
    name: Verify Package Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify package compliance
        run: bun run scripts/ci/verify-packages.ts

  quality_checks:
    name: Code Quality, Build & Test (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify-packages
    strategy:
      fail-fast: false
      matrix:
        bun-version: ['latest', '1.2.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start PostgreSQL test database
        run: |
          docker compose -f platform/dev/docker-compose.yml up -d test-db
          echo "Waiting for PostgreSQL to be ready..."
          timeout 60 bash -c 'until docker exec lucid-agents-test-db pg_isready -U postgres -d lucid_agents_test; do sleep 2; done' || exit 1
          echo "PostgreSQL is ready!"

      - name: Build packages
        run: bun run build:packages

      - name: Typecheck packages
        run: bun run type-check

      - name: Lint packages
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test packages
        env:
          TEST_POSTGRES_URL: postgresql://postgres:test_password@localhost:5435/lucid_agents_test
          TEST_DATABASE_URL: postgresql://postgres:test_password@localhost:5435/lucid_agents_test
        run: bun test

      - name: Stop PostgreSQL test database
        if: always()
        run: |
          docker compose -f platform/dev/docker-compose.yml stop test-db || true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality_checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Run integration tests
        run: bun test packages/integration-tests/

  cli-scaffold-smoke:
    name: CLI Scaffold Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality_checks
    strategy:
      fail-fast: false
      matrix:
        template: ['blank', 'axllm', 'axllm-flow', 'identity']
        adapter: ['hono', 'express']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build:packages

      - name: Scaffold project
        run: |
          mkdir -p /tmp/scaffold-test
          cd /tmp/scaffold-test
          ${{ github.workspace }}/packages/cli/dist/index.js init test-project \
            --template ${{ matrix.template }} \
            --adapter ${{ matrix.adapter }} \
            --skip-install

      - name: Install scaffolded project dependencies
        working-directory: /tmp/scaffold-test/test-project
        run: bun install

      - name: Type-check scaffolded project
        working-directory: /tmp/scaffold-test/test-project
        run: |
          # Run tsc if tsconfig exists
          if [ -f "tsconfig.json" ]; then
            bunx tsc --noEmit
          fi

      - name: Build scaffolded project
        working-directory: /tmp/scaffold-test/test-project
        run: |
          # Try to build if build script exists
          if grep -q '"build"' package.json; then
            bun run build
          fi
