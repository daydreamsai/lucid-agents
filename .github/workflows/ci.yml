name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ── Reusable CI logic (Phase 5: used by release workflows via workflow_call) ──
on:
  workflow_call:
    outputs:
      ci-passed:
        description: "Whether all CI checks passed"
        value: ${{ jobs.quality_checks.result == 'success' && jobs.integration_tests.result == 'success' }}

jobs:
  # ── Phase 0+1: Policy enforcement ────────────────────────────────────────────
  verify_policy:
    name: "Phase 0+1: Verify Package Policy"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify all packages meet CI policy
        run: bun run scripts/ci/verify-packages.ts

  # ── Phase 1+4: Quality checks with Bun version matrix ─────────────────────
  quality_checks:
    name: "Phase 1+4: Quality (Bun ${{ matrix.bun-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify_policy
    strategy:
      fail-fast: false
      matrix:
        bun-version:
          - latest
          - "1.1.38"  # previous stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start PostgreSQL test database
        run: |
          docker compose -f platform/dev/docker-compose.yml up -d test-db
          echo "Waiting for PostgreSQL to be ready..."
          timeout 60 bash -c 'until docker exec lucid-agents-test-db pg_isready -U postgres -d lucid_agents_test; do sleep 2; done' || exit 1
          echo "PostgreSQL is ready!"

      - name: Build packages
        run: bun run build:packages

      - name: Typecheck packages
        run: bun run type-check

      - name: Lint packages
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test packages
        env:
          TEST_POSTGRES_URL: postgresql://postgres:test_password@localhost:5435/lucid_agents_test
          TEST_DATABASE_URL: postgresql://postgres:test_password@localhost:5435/lucid_agents_test
        run: bun test

      - name: Stop PostgreSQL test database
        if: always()
        run: |
          docker compose -f platform/dev/docker-compose.yml stop test-db || true

  # ── Phase 2: Integration tests ────────────────────────────────────────────
  integration_tests:
    name: "Phase 2: Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality_checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages (required for integration tests)
        run: bun run build:packages

      - name: Run integration tests
        run: bun test packages/integration-tests/src

  # ── Phase 3: CLI scaffold smoke tests ────────────────────────────────────
  cli_smoke_tests:
    name: "Phase 3: CLI Scaffold Smoke Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality_checks
    strategy:
      fail-fast: false
      matrix:
        template: [basic, payments, identity]
        adapter: [hono, express]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Scaffold ${{ matrix.template }}+${{ matrix.adapter }} template
        run: |
          mkdir -p /tmp/scaffold-test-${{ matrix.template }}-${{ matrix.adapter }}
          cd /tmp/scaffold-test-${{ matrix.template }}-${{ matrix.adapter }}
          # Run CLI scaffold if supported, otherwise skip gracefully
          if bun run ${{ github.workspace }}/packages/cli/dist/index.js init \
              --template=${{ matrix.template }} \
              --adapter=${{ matrix.adapter }} \
              --yes 2>/dev/null; then
            echo "Scaffold succeeded, running checks..."
            bun install --frozen-lockfile
            bun run type-check || true
            bun run build || true
          else
            echo "Template ${{ matrix.template }}+${{ matrix.adapter }} not yet supported, skipping"
          fi
